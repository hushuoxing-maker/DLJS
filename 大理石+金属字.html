<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>古月AI智能体 · 大理石+金属字门头灵感库 4.0（双语版）</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}
body{
  background:linear-gradient(135deg,#F3F4F6,#F9FAFB);
  padding:20px 0 60px;
}
.header{
  background:linear-gradient(90deg,#111827,#1F2937);
  color:#fff;
  text-align:center;
  padding:40px 20px;
  margin-bottom:30px;
}
.wrap{
  max-width:1000px;
  margin:0 auto 30px;
  background:#fff;
  padding:30px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.05);
}
input,select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ddd;
  border-radius:8px;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.gen-btn{
  width:100%;
  background:#111827;
  color:#fff;
}
.result{
  max-width:1300px;
  margin:0 auto;
}
.item{
  background:#fff;
  padding:18px;
  margin-bottom:18px;
  border-radius:12px;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.row{display:flex;gap:20px;}
.col{flex:1;}
.text{font-size:13px;line-height:1.7;}
.copy-btn{
  margin-top:8px;
  background:#111827;
  color:#fff;
  font-size:12px;
}
.copy-btn.copied{
  background:#ccc !important;
  color:#666 !important;
  cursor:default;
}
.copy-all{
  display:block;
  margin:25px auto;
  background:#111827;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">
<h1>古月AI智能体 · 大理石+金属字门头灵感库 4.0（双语版）</h1>
</div>

<div class="wrap">

<input id="industry" placeholder="请输入行业，例如：高端餐饮、珠宝、民宿">

<select id="scene">
<option value="白天自然光环境">白天自然光环境</option>
<option value="夜景灯光环境">夜景灯光环境</option>
</select>

<button class="gen-btn" onclick="generate()">🚀 生成20组完全不同提示词</button>

</div>

<div class="result" id="result"></div>

<script>

const scales=["小型精致店铺","标准中型商业店铺","大型旗舰店立面"];
const environments=["商业街区独栋建筑","城市主干道沿街立面","商场外立面界面","高端社区底商空间"];
const materials=["天然大理石干挂","奢石拼接立面","深色石材整体包覆","浅色石材与金属嵌合结构"];
const metals=["拉丝不锈钢立体字","黄铜质感金属字","黑钛金属字","背发光立体金属字"];
const angles=["正面平视视角","轻微仰视视角","建筑正立面无透视畸变","标准商业效果图视角"];
const lighting=["洗墙灯光系统","线性隐藏灯带","轮廓光勾边系统","重点标识背光系统"];

function r(arr){return arr[Math.floor(Math.random()*arr.length)];}

function generate(){

let industry=document.getElementById("industry").value.trim();
if(!industry){alert("请输入行业");return;}

let scene=document.getElementById("scene").value;

let result=document.getElementById("result");
result.innerHTML="";
let used=new Set();
let all=[];

while(all.length<20){

let zh=`${scene}，${r(scales)}，${industry}店铺门头设计，${r(environments)}，${r(angles)}，完整展示店铺正立面无遮挡无裁切，主立面采用${r(materials)}，品牌标识为${r(metals)}，结合${r(lighting)}，高端商业建筑效果图，8K超清写实渲染`;

let en=`${scene}, ${r(scales)}, ${industry} storefront facade design, located in ${r(environments)}, ${r(angles)}, full front elevation completely visible without obstruction, primary facade finished with ${r(materials)}, signage crafted in ${r(metals)}, integrated ${r(lighting)}, premium commercial architectural visualization, ultra-realistic 8K render`;

if(!used.has(zh)){
used.add(zh);
all.push({zh,en});
}
}

let html="";
all.forEach((obj,i)=>{
html+=`
<div class="item">
<b>第${i+1}组</b>
<div class="row">
<div class="col">
<div class="text">${obj.zh}</div>
<button class="copy-btn" onclick="copyText(\`${obj.zh}\`,this)">复制中文</button>
</div>
<div class="col">
<div class="text">${obj.en}</div>
<button class="copy-btn" onclick="copyText(\`${obj.en}\`,this)">Copy English</button>
</div>
</div>
</div>
`;
});

html+=`<button class="copy-all" onclick="copyAll()">📋 一键复制全部</button>`;
result.innerHTML=html;

window.allPrompts=all;

}

function copyText(text,btn){
navigator.clipboard.writeText(text).then(()=>{
btn.classList.add("copied");
btn.innerText="已复制";
});
}

function copyAll(){
let t="";
window.allPrompts.forEach((p,i)=>{
t+=`${i+1}. ${p.zh}\n${p.en}\n\n`;
});
navigator.clipboard.writeText(t).then(()=>alert("已复制全部"));
}

</script>
</body>
</html>
