<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>古月AI智能体 · 理石+金属字门头灵感库 5.1 旗舰版</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif;}

body{
  background:
    radial-gradient(circle at 20% 30%, rgba(0,150,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(140,0,255,0.15), transparent 40%),
    linear-gradient(135deg,#0B1020,#0F172A,#1E1B4B);
  color:#E5E7EB;
  padding:30px 0 60px;
}

.header{
  text-align:center;
  padding:50px 20px;
}
.header h1{
  font-size:28px;
  background:linear-gradient(90deg,#38BDF8,#A855F7,#38BDF8);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}
@keyframes shine{to{background-position:200% center;}}

.wrap{
  max-width:1000px;
  margin:0 auto 40px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  color:#fff;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.gen-btn{
  width:100%;
  background:linear-gradient(90deg,#2563EB,#9333EA);
  color:#fff;
  box-shadow:0 0 20px rgba(147,51,234,0.6);
}
.gen-btn:hover{transform:translateY(-2px);}

.result{max-width:1300px;margin:0 auto;}
.item{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:20px;
  margin-bottom:18px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
}

.row{display:flex;gap:20px;}
.col{flex:1;}
.text{font-size:13px;line-height:1.7;}

.copy-btn{
  margin-top:8px;
  background:linear-gradient(90deg,#06B6D4,#3B82F6);
  color:#fff;
  font-size:12px;
}
.copy-btn.copied{
  background:#444 !important;
  color:#888 !important;
  cursor:default;
}

.copy-all{
  display:block;
  margin:25px auto;
  background:linear-gradient(90deg,#2563EB,#9333EA);
  color:#fff;
}
</style>
</head>

<body>

<div class="header">
<h1>古月AI智能体 · 理石+金属字门头灵感库 5.1 旗舰版</h1>
</div>

<div class="wrap">

<input id="brand" placeholder="输入品牌名称">
<input id="industry" placeholder="输入行业，例如：高端餐饮、珠宝、民宿">

<select id="scene">
<option value="白天自然光环境">白天自然光环境</option>
<option value="夜景灯光环境">夜景灯光环境</option>
<option value="雨后街区氛围">雨后街区氛围</option>
</select>

<button class="gen-btn" onclick="generate()">🚀 生成20组旗舰级提示词</button>

</div>

<div class="result" id="result"></div>

<script>
const scales=["小型精致店铺","标准中型商业空间","大型城市旗舰店","双层挑高门头","横向超长立面"];
const environments=["商业街区独栋","商场外立面界面","高端社区底商","城市主干道沿街建筑"];
const materials=["天然大理石干挂","奢石拼接立面","深色石材整体包覆","浅色石材与金属嵌合结构"];
const metals=["拉丝不锈钢立体字","黄铜金属字","黑钛金属字","背发光立体金属字"];
const lenses=["35mm镜头","50mm标准镜头","85mm建筑摄影镜头"];
const photo=["HDR高动态范围","超清建筑摄影","电影级光影质感","商业广告级写实渲染"];

function r(a){return a[Math.floor(Math.random()*a.length)];}

function buildPrompt(brand,industry,scene){
let zh=`${scene}下，${brand}${industry}门头设计方案，${r(scales)}，位于${r(environments)}，**店铺正立面完全展示**无遮挡，立面主材采用${r(materials)}，品牌标识为${r(metals)}，强调比例与建筑秩序，${r(lenses)}拍摄，${r(photo)}，8K超清效果图`;
let en=`Under ${scene}, facade concept for ${brand} ${industry}, ${r(scales)} scale, located within ${r(environments)}, **full front elevation completely visible**, finished with ${r(materials)}, signage crafted in ${r(metals)}, emphasizing architectural proportion and order, shot using ${r(lenses)}, ${r(photo)}, ultra-realistic 8K render`;
return {zh,en};
}

function generate(){
let brand=document.getElementById("brand").value.trim()||"某品牌";
let industry=document.getElementById("industry").value.trim();
if(!industry){alert("请输入行业");return;}
let scene=document.getElementById("scene").value;

let result=document.getElementById("result");
result.innerHTML="";
let used=new Set();
let all=[];

while(all.length<20){
let p=buildPrompt(brand,industry,scene);
if(!used.has(p.zh)){
used.add(p.zh);
all.push(p);
}
}

let html="";
all.forEach((obj,i)=>{
html+=`
<div class="item">
<b>第${i+1}组</b>
<div class="row">
<div class="col">
<div class="text">${obj.zh}</div>
<button class="copy-btn" onclick="copyText(\`${obj.zh}\`,this)">复制中文</button>
</div>
<div class="col">
<div class="text">${obj.en}</div>
<button class="copy-btn" onclick="copyText(\`${obj.en}\`,this)">Copy English</button>
</div>
</div>
</div>
`;
});

html+=`<button class="copy-all" onclick="copyAll()">📋 一键复制全部</button>`;
result.innerHTML=html;

window.allPrompts=all;
}

function copyText(text,btn){
navigator.clipboard.writeText(text).then(()=>{
btn.classList.add("copied");
btn.innerText="已复制";
});
}

function copyAll(){
let t="";
window.allPrompts.forEach((p,i)=>{
t+=`${i+1}. ${p.zh}\n${p.en}\n\n`;
});
navigator.clipboard.writeText(t).then(()=>alert("已复制全部"));
}
</script>
</body>
</html>
